<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root {
  --bg:#F0F1F8;
  --surface:#FFFFFF;
  --surface2:#F5F6FA;
  --border:#DDE1EE;
  --text:#1A1A2E;
  --muted:#7A8099;
  --accent:#1E7A44;
  --accent2:#2ECC71;
  --green:#1E7A44;
  --amber:#E07B00;
  --purple:#7B52D4;
  --red:#D93025;
  --blue:#1A6B9A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:linear-gradient(135deg,#1A6B3C,#2D8B55);border-bottom:1px solid #166234;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{width:38px;height:38px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header h1{font-size:16px;font-weight:600;color:#fff}
.header p{font-size:11px;color:rgba(255,255,255,0.7);margin-top:1px}
.btn{display:inline-flex;align-items:center;gap:7px;background:#fff;color:#1A6B3C;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:hover{background:#f0f0f0}
.filters{display:flex;gap:10px;padding:12px 28px;flex-wrap:wrap;background:#0A0F1E;border-bottom:1px solid var(--border)}
select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;min-width:130px;font-family:inherit;appearance:none}
select:focus{outline:none;border-color:var(--accent)}
.toggle-btn{background:transparent;border:1px solid #444;color:#ccc;padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.toggle-btn.active{background:#1E7A44;border-color:#1E7A44;color:#fff}
.clear-btn{background:transparent;border:1px solid #444;color:#ccc;padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.record-count{margin-left:auto;font-size:12px;color:#ccc;align-self:center}
.main{padding:24px 28px;display:flex;flex-direction:column;gap:24px}
.kpi-grid{display:flex;gap:12px;flex-wrap:wrap}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;flex:1;min-width:130px;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s}
.kpi-card:hover{border-color:#1E7A44;box-shadow:0 2px 12px rgba(30,122,68,0.15)}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;font-weight:500}
.kpi-value{font-size:32px;font-weight:700;margin:8px 0 4px;line-height:1}
.kpi-sub{font-size:11px;color:var(--muted)}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.geo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.geo-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.geo-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.geo-card-header h3{font-size:13px;font-weight:600;color:var(--text)}
.geo-total{font-size:11px;background:var(--surface2);color:var(--accent);padding:2px 8px;border-radius:20px;font-weight:600}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-label{font-size:11px;color:var(--muted);width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:6px;background:var(--border);border-radius:3px}
.bar-fill{height:6px;border-radius:3px}
.bar-count{font-size:11px;color:var(--text);width:20px;text-align:right}
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 14px;text-align:left;color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;background:var(--surface2);white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:var(--surface2)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.badge-done{background:#D4EDDA;color:#1A6B3C}
.badge-design{background:#FFF3CD;color:#E07B00}
.badge-progress{background:#E8E0FF;color:#7B52D4}
.badge-offline{background:#FDDCDA;color:#D93025}
.badge-submitted{background:#D0E8F5;color:#1A6B9A}
.badge-other{background:var(--surface2);color:var(--muted)}
a.domain-link{color:var(--accent);text-decoration:none}
a.domain-link:hover{text-decoration:underline}
.pagination{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid var(--border)}
.pg-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 14px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit}
.pg-btn:disabled{opacity:0.3;cursor:default}
.pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#D93025;font-size:14px}
.err-sub{color:var(--muted);font-size:12px}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">📊</div>
    <div>
      <h1>Pipeline Dashboard</h1>
      <p id="updated">Loading...</p>
    </div>
  </div>
  <button class="btn" onclick="loadData()">↻ Refresh</button>
</div>

<div class="filters">
  <select id="f-geo" onchange="applyFilters()"><option value="">All GEOs</option></select>
  <select id="f-status" onchange="applyFilters()"><option value="">All Statuses</option></select>
  <select id="f-designer" onchange="applyFilters()"><option value="">All Designers</option></select>
  <select id="f-angle" onchange="applyFilters()"><option value="">All Angles</option></select>
  <button class="toggle-btn" id="f-tbs" onclick="toggleTBS()">To Be Submitted</button>
  <button class="clear-btn" id="clear-btn" onclick="clearFilters()" style="display:none">✕ Clear</button>
  <span class="record-count" id="record-count"></span>
</div>

<div id="app">
  <div class="state"><div class="spinner"></div><p style="color:var(--muted)">Loading pipeline data...</p></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz2T7otsvka2_WUUwoUdp199jHohuSIEvVMBV4yhMIETHwPgo5b0I9_mcUOneoz4emS1w/exec";
const PG = 50;
const HIDDEN_COLS = ['CREDENTIALS'];

let allData = [], filtered = [], page = 1, tbsActive = false;

const sKey = s => {
  const v = (s||'').toLowerCase();
  if(v==='done') return 'done';
  if(v.includes('design')) return 'design';
  if(v.includes('progress')) return 'progress';
  if(v==='offline') return 'offline';
  return 'other';
};

const sColor = s => ({done:'#1E7A44',design:'#E07B00',progress:'#7B52D4',offline:'#D93025',other:'#7A8099'}[sKey(s)]);
const sBadge = s => `<span class="badge badge-${sKey(s)}"><span class="badge-dot" style="background:${sColor(s)}"></span>${s||'—'}</span>`;
const subBadge = s => s && s.toString().trim() !== ''
  ? `<span class="badge badge-submitted"><span class="badge-dot" style="background:#1A6B9A"></span>Submitted</span>`
  : `<span class="badge badge-other"><span class="badge-dot" style="background:#7A8099"></span>Pending</span>`;

const formatDate = v => {
  if(!v || v.toString().trim() === '') return '—';
  const s = v.toString();
  if(s.includes('T')) return s.split('T')[0];
  return s;
};

async function loadData() {
  document.getElementById('app').innerHTML = '<div class="state"><div class="spinner"></div><p style="color:var(--muted)">Fetching live data...</p></div>';
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    allData = data;
    populateFilters();
    applyFilters();
    document.getElementById('updated').textContent = 'Live · Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="state"><p class="err">Failed to load data</p><p class="err-sub">${e.message}</p><button class="btn" onclick="loadData()" style="margin-top:8px">↻ Retry</button></div>`;
  }
}

function populateFilters() {
  [['f-geo','GEO'],['f-status','STATUS'],['f-designer','DESIGNER'],['f-angle','ANGLE']].forEach(([id,col])=>{
    const sel = document.getElementById(id), cur = sel.value;
    const vals = [...new Set(allData.map(r=>r[col]).filter(Boolean))].sort();
    sel.innerHTML = `<option value="">All ${col}s</option>` + vals.map(v=>`<option${v===cur?' selected':''}>${v}</option>`).join('');
  });
}

function toggleTBS() {
  tbsActive = !tbsActive;
  document.getElementById('f-tbs').classList.toggle('active', tbsActive);
  applyFilters();
}

function filterByKPI(type) {
  ['f-geo','f-designer','f-angle'].forEach(id=>document.getElementById(id).value='');
  tbsActive = false;
  document.getElementById('f-tbs').classList.remove('active');
  const statusEl = document.getElementById('f-status');
  if(type==='tbs') { tbsActive=true; document.getElementById('f-tbs').classList.add('active'); statusEl.value='Done'; }
  else if(type==='coded') { statusEl.value='To Be Coded'; }
  else if(type==='design') { statusEl.value='In Design'; }
  else if(type==='content') { statusEl.value='Ready For Content'; }
  applyFilters();
  setTimeout(()=>{ const el=document.getElementById('records-section'); if(el) el.scrollIntoView({behavior:'smooth'}); },150);
}

function applyFilters() {
  const g=document.getElementById('f-geo').value, s=document.getElementById('f-status').value,
        d=document.getElementById('f-designer').value, a=document.getElementById('f-angle').value;
  filtered = allData.filter(r=>{
    if(g && r.GEO!==g) return false;
    if(d && r.DESIGNER!==d) return false;
    if(a && r.ANGLE!==a) return false;
    if(tbsActive) return sKey(r.STATUS)==='done' && (!r.SUBMITTED||r.SUBMITTED.toString().trim()==='');
    if(s && r.STATUS!==s) return false;
    return true;
  });
  document.getElementById('clear-btn').style.display=(g||s||d||a||tbsActive)?'block':'none';
  document.getElementById('record-count').textContent=filtered.length+' records';
  page=1; render();
}

function clearFilters() {
  ['f-geo','f-status','f-designer','f-angle'].forEach(id=>document.getElementById(id).value='');
  tbsActive=false; document.getElementById('f-tbs').classList.remove('active');
  applyFilters();
}

// KPIs always calculated from full allData regardless of filters
function getKPIs() {
  return {
    toBeSubmitted: allData.filter(r=>sKey(r.STATUS)==='done' && (!r.SUBMITTED||r.SUBMITTED.toString().trim()==='')).length,
    toBeCoded: allData.filter(r=>(r.STATUS||'').toLowerCase()==='to be coded').length,
    inDesign: allData.filter(r=>(r.STATUS||'').toLowerCase()==='in design').length,
    readyForContent: allData.filter(r=>(r.STATUS||'').toLowerCase()==='ready for content').length,
  };
}

function render() {
  const total=filtered.length;
  if(!total){document.getElementById('app').innerHTML='<div class="state"><p style="color:var(--muted)">No records match filters.</p></div>';return;}

  const {toBeSubmitted,toBeCoded,inDesign,readyForContent} = getKPIs();

  const geoMap={};
  filtered.forEach(r=>{
    const g=r.GEO&&r.GEO.toString().trim()!==''?r.GEO:'Unknown';
    if(!geoMap[g])geoMap[g]={_t:0};
    const st=r.STATUS||'Unknown';
    geoMap[g][st]=(geoMap[g][st]||0)+1;
    geoMap[g]._t++;
  });

  const keys=Object.keys(allData[0]||{}).filter(k=>!HIDDEN_COLS.includes(k));
  const start=(page-1)*PG, pageData=filtered.slice(start,start+PG), totalPages=Math.ceil(total/PG)||1;

  document.getElementById('app').innerHTML=`
  <div class="main">
    <div class="kpi-grid">
      ${[
        ['To Be Submitted',toBeSubmitted,'#E07B00','done, not submitted',true,'tbs'],
        ['To Be Coded',toBeCoded,'#1A6B9A','awaiting dev',false,'coded'],
        ['In Design',inDesign,'#7B52D4','in design',false,'design'],
        ['Ready For Content',readyForContent,'#1E7A44','content pending',false,'content'],
      ].map(([l,v,c,s,hl,type])=>`
      <div class="kpi-card" onclick="filterByKPI('${type}')" style="${hl?'border-color:'+c+';':''}">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${c};border-radius:14px 14px 0 0"></div>
        <div class="kpi-label">${l}</div>
        <div class="kpi-value" style="color:${c}">${v}</div>
        <div class="kpi-sub">${s}</div>
      </div>`).join('')}
    </div>

    <div>
      <div class="section-title">By GEO</div>
      <div class="geo-grid">
        ${Object.entries(geoMap).sort((a,b)=>b[1]._t-a[1]._t).map(([geo,counts])=>{
          const t=counts._t,rows=Object.entries(counts).filter(([k])=>k!=='_t').sort((a,b)=>b[1]-a[1]);
          return `<div class="geo-card">
            <div class="geo-card-header"><h3>${geo}</h3><span class="geo-total">${t}</span></div>
            ${rows.map(([s,c])=>`<div class="bar-row">
              <span class="bar-label">${s}</span>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/t*100)}%;background:${sColor(s)}"></div></div>
              <span class="bar-count">${c}</span>
            </div>`).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>

    <div id="records-section">
      <div class="section-title">All Records (${total})</div>
      <div class="table-container">
        <div class="table-wrap">
          <table>
            <thead><tr>${keys.map(k=>`<th>${k}</th>`).join('')}</tr></thead>
            <tbody>
              ${pageData.map(r=>`<tr>${keys.map(k=>{
                const v=r[k]!==undefined?r[k]:'';
                if(k==='STATUS') return `<td>${sBadge(v)}</td>`;
                if(k==='SUBMITTED') return `<td>${subBadge(v)}</td>`;
                if(k==='DOMAIN') return `<td><a class="domain-link" href="https://${v}" target="_blank">${v||'—'}</a></td>`;
                if(k==='DEPLOYED DATE') return `<td>${formatDate(v)}</td>`;
                return `<td title="${v}">${v||'—'}</td>`;
              }).join('')}</tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div class="pagination">
          <span style="font-size:12px;color:var(--muted)">${start+1}–${Math.min(start+PG,total)} of ${total} · Page ${page}/${totalPages}</span>
          <div style="display:flex;gap:8px">
            <button class="pg-btn" onclick="changePage(-1)" ${page===1?'disabled':''}>← Prev</button>
            <button class="pg-btn" onclick="changePage(1)" ${page===totalPages?'disabled':''}>Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function changePage(dir){page+=dir;render();window.scrollTo(0,0);}
loadData();
</script>
</body>
</html>
